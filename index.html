<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uteach</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-[#10172E]">


  <header class="w-full">
    <div class="max-w-[1200px] mx-auto px-4 md:px-8 py-6 flex items-center justify-between">

      <img src="img/1.png" alt="logo" class="w-[112px]" />

      <nav class="hidden md:flex items-center gap-14 text-[16px] font-semibold">
        <a href="#">Products</a>
        <a href="#">Solutions</a>
        <a href="#">Pricing</a>
        <a href="#" class="flex items-center gap-2">
          Resources
          <img src="img/2.png" alt="arrow" class="w-4" />
        </a>
      </nav>

      <div class="hidden md:flex items-center gap-6 text-[16px] font-semibold">
        <a href="#">Log In</a>
        <button class="border-2 border-[#10172E] rounded-md px-7 py-3">
          Sign Up Now
        </button>
      </div>

      <button class="md:hidden">
        <img src="img/3.png" alt="menu" class="w-6" />
      </button>

    </div>
  </header>


  <section class="max-w-[1200px] mx-auto px-4 md:px-8 pt-10 md:pt-20 pb-16 md:pb-24">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-12 md:gap-16 items-center">

    
      <div>

        <h1 class="relative text-[42px] md:text-[72px] font-bold leading-[1.05] mb-7">
          Teach students <br />
          worldwide

          <img
            src="img/6.png"
            alt=""
            class="absolute left-0 top-[35px]  md:top-[73px] w-[165px] md:w-[200px] -z-0"
          />
        </h1>

        <p class="text-[16px] md:text-[24px] leading-7 md:leading-9 max-w-[620px] mb-8 md:mb-9">
          Amet nunc diam orci duis ut sit diam arcu, nec.
          Eleifend proin massa tincidunt viverra lectus pulvinar.
          Nunc ipsum est pellentesque turpis ultricies.
        </p>

        <div class="flex items-center gap-8 md:gap-10 mb-9 md:mb-20">
          <button class="bg-[#F45B0F] text-white rounded-md px-7 md:px-12 py-4 text-[16px] md:text-[24px] font-bold">
            Sign Up Now
          </button>

          <button class="flex items-center gap-4 text-[#2563FF] text-[16px] md:text-[20px] font-bold">
            <img src="img/4.png" alt="play" class="w-6" />
            View Demo
          </button>
        </div>

        <div class="flex flex-col md:flex-row md:items-center gap-5 md:gap-10">
          <p class="text-[#475569] text-[16px] leading-6">
            Trusted by <br class="hidden md:block" />
            leading companies
          </p>

          <div class="flex items-center gap-6 md:gap-9">
            <img src="img/7.png" alt="company" class="w-8 md:w-9" />
            <img src="img/8.png" alt="company" class="w-8 md:w-9" />
            <img src="img/9.png" alt="company" class="w-8 md:w-9" />
            <img src="img/10.png" alt="company" class="w-8 md:w-9" />
            <img src="img/11.png" alt="company" class="w-8 md:w-9" />
          </div>
        </div>

      </div>

      <div class="flex justify-center md:justify-end">
        <img
          src="img/5.png"
          alt="hero"
          class="w-full max-w-[560px] md:max-w-[620px]"
        />
      </div>

    </div>

  </section>

</body>
</html>
